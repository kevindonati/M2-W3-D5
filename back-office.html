<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Documento</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="min-vh-100 d-flex flex-column">
    <header class="position-sticky top-0">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand fs-4" href="./index.html"
            ><span class="text-primary">Funko</span
            ><span class="text-danger">Pop</span></a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./back-office.html"
                  >Back-office</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <div class="text-center mt-5">
        <h1>Back-Office</h1>
        <h4>Crea il prodotto da aggiungere al sito</h4>
      </div>
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-6">
            <form id="form" class="row g-3">
              <div class="col-12">
                <label for="nome-prodotto" class="form-label"
                  >Nome prodotto</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="nome-prodotto"
                  required
                />
              </div>

              <div class="col-12">
                <label for="descrizione" class="form-label">Descrizione</label>
                <input
                  type="text"
                  class="form-control"
                  id="descrizione"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="marca" class="form-label">Marca</label>
                <input type="text" class="form-control" id="marca" required />
              </div>

              <div class="col-md-6">
                <label for="prezzo" class="form-label">Prezzo</label>
                <input
                  type="number"
                  class="form-control"
                  id="prezzo"
                  required
                />
              </div>

              <div class="col-12">
                <label for="immagine" class="form-label"
                  >Immagine prodotto</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="immagine"
                  required
                />
              </div>
              <div class="col-12">
                <button
                  id="bottone-aggiungi"
                  type="submit"
                  class="btn btn-primary w-100"
                >
                  Aggiungi
                </button>
                <!-- <button
                  id="bottone-refresh"
                  type="reset"
                  class="btn btn-warning w-100 mt-2"
                >
                  Reset form
                </button> -->

                <button
                  type="button"
                  class="btn btn-warning mt-2 w-100"
                  data-bs-toggle="modal"
                  data-bs-target="#staticBackdrop"
                >
                  Reset form
                </button>

                <!-- MODALE -->
                <div
                  class="modal fade"
                  id="staticBackdrop"
                  data-bs-backdrop="static"
                  data-bs-keyboard="false"
                  tabindex="-1"
                  aria-labelledby="staticBackdropLabel"
                  aria-hidden="true"
                >
                  <div class="modal-dialog">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">
                          Reset form
                        </h1>
                        <button
                          type="button"
                          class="btn-close"
                          data-bs-dismiss="modal"
                          aria-label="Close"
                        ></button>
                      </div>
                      <div class="modal-body">
                        Sei sicuro di voler resettare il form? L'azione è
                        irreversibile
                      </div>
                      <div class="modal-footer">
                        <button
                          type="button"
                          class="btn btn-secondary"
                          data-bs-dismiss="modal"
                        >
                          No
                        </button>
                        <button
                          onclick="resetForm()"
                          type="button"
                          class="btn btn-danger"
                          data-bs-dismiss="modal"
                        >
                          Resetta form
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="container mt-5">
        <div
          id="contenitore-prodotti"
          class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-2"
        ></div>

        <!-- MODALE ELIMINAZIONE -->
        <div
          class="modal fade"
          id="eliminaProdotto"
          data-bs-backdrop="static"
          data-bs-keyboard="false"
          tabindex="-1"
          aria-labelledby="eliminaProdottoLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="eliminaProdottoLabel">
                  Elimina prodotto
                </h1>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                Sei sicuro di voler eliminare il prodotto? L'azione è
                irreversibile
              </div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Close
                </button>
                <button
                  id="bottone-elimina"
                  type="button"
                  class="btn btn-danger"
                  data-bs-dismiss="modal"
                >
                  Elimina
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center bg-black mt-5">
      <p class="m-0 p-4">2026 - FunkoPop</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script/back-office.js"></script>
  </body>
</html>
